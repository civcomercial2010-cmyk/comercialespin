name: Actualizar cuadro de mando

on:
  schedule:
    - cron: '15 18 * * 1-5'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python y dependencias
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar openpyxl
        run: pip install openpyxl --upgrade --no-cache-dir

      - name: Ejecutar extractor de ventas
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          ASUNTO_FILTRO:  ${{ secrets.ASUNTO_FILTRO }}
          REMITENTE:      ${{ secrets.REMITENTE }}
        run: python extractor_ventas_actions.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json cuadro_mando_hipopotamo.html
          git diff --staged --quiet || git commit -m "datos $(date '+%Y-%m') — actualización automática"
          git push --force origin main
```

Guarda con **Commit changes**. Luego desde la terminal en `repo_github`:
```
git pull origin main
