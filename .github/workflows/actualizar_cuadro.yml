name: Actualizar cuadro de mando

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # Dos disparos para cubrir CET/CEST; solo continuará si en España son las 20:30
    - cron: '30 18 * * 1-5'
    - cron: '30 19 * * 1-5'
  workflow_dispatch:
    inputs:
      force_run:
        description: "Reservado (la ejecución manual ya corre siempre el extractor)"
        required: false
        default: "true"

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio (con historial)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install openpyxl

      - name: Comprobar hora España (ventana ~20:30)
        id: hora
        env:
          TZ: Europe/Madrid
        run: |
          HM=$(date +%H%M)
          echo "Hora local (Europe/Madrid): $(date '+%H:%M') (HM=$HM)"
          # Ejecución manual: siempre actualiza (el usuario ha pulsado "Run workflow")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Ejecución manual: se ejecuta el extractor."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Programado: ventana 20:00–21:59 (Madrid). La cola de GitHub puede retrasar el job
          # ~30 min (p. ej. paso "Comprobar hora" a las 21:00); ventanas cortas dejan run=false.
          if [ "$HM" -ge 2000 ] && [ "$HM" -le 2159 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ejecutar extractor
        if: steps.hora.outputs.run == 'true'
        env:
          TZ: Europe/Madrid
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          ASUNTO_FILTRO:  ${{ secrets.ASUNTO_FILTRO }}
          REMITENTE:      ${{ secrets.REMITENTE }}
        run: python extractor_ventas_actions.py

      - name: Commit y push si hay cambios
        if: steps.hora.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json cuadro_mando_hipopotamo.html
          if git diff --staged --quiet; then
            echo "No hay cambios que commitear."
            exit 0
          fi

          git commit -m "datos $(date '+%Y-%m') — actualización automática"

          # Rebase contra origin/main y push con reintentos por colisiones
          for i in 1 2 3; do
            echo "Intento $i: sincronizando con origin/main..."
            git fetch origin main
            git rebase origin/main || (git rebase --abort && exit 1)

            echo "Intento $i: haciendo push..."
            if git push origin HEAD:main; then
              echo "Push correcto."
              exit 0
            fi

            echo "Push rechazado; reintentando en 10s..."
            sleep 10
          done

          echo "ERROR: No se pudo hacer push tras 3 intentos."
          exit 1