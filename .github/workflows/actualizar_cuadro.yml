name: Actualizar cuadro de mando

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # 20:05 hora española exacta en ambas estaciones (necesario porque GitHub cron es UTC fijo):
    # 18:05 UTC = 20:05 CEST (verano, UTC+2, mar–oct)
    # 19:05 UTC = 20:05 CET  (invierno, UTC+1, oct–mar)
    # En verano dispara a las 18:05 UTC (correcto) y también a las 19:05 UTC (1h después, inócuo).
    # En invierno dispara a las 18:05 UTC (1h antes del correo, no lo encuentra) y a las 19:05 UTC (correcto).
    - cron: '05 18 * * *'
    - cron: '05 19 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: "Reservado (la ejecución manual ya corre siempre el extractor)"
        required: false
        default: "true"

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: actualizar-cuadro-main
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio (con historial)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install openpyxl

      - name: Ejecutar extractor
        env:
          TZ: Europe/Madrid
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          ASUNTO_FILTRO:  ${{ secrets.ASUNTO_FILTRO }}
          REMITENTE:      ${{ secrets.REMITENTE }}
        run: python extractor_ventas_actions.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json cuadro_mando_hipopotamo.html
          if git diff --staged --quiet; then
            echo "No hay cambios que commitear."
            exit 0
          fi

          git commit -m "datos $(date '+%Y-%m') — actualización automática"

          # Rebase contra origin/main y push con reintentos por colisiones
          for i in 1 2 3; do
            echo "Intento $i: sincronizando con origin/main..."
            git fetch origin main
            git rebase origin/main || (git rebase --abort && exit 1)

            echo "Intento $i: haciendo push..."
            if git push origin HEAD:main; then
              echo "Push correcto."
              exit 0
            fi

            echo "Push rechazado; reintentando en 10s..."
            sleep 10
          done

          echo "ERROR: No se pudo hacer push tras 3 intentos."
          exit 1